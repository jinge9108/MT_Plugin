name: Android CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-mtp:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build release mtp
      run: ./gradlew packageReleaseMtp

    - name: Upload mtp artifact
      uses: actions/upload-artifact@v4
      with:
        name: mtp-release
        path: build/outputs/mt-plugin/*.mtp

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-mtp
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download mtp artifact
      uses: actions/download-artifact@v4
      with:
        name: mtp-release
        path: dist

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*.mtp
        generate_release_notes: true
